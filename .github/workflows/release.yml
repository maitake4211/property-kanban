name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18.x"

      - name: Build plugin
        run: |
          npm ci
          npm run build

      - name: Verify manifest version matches tag
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          manifest_version=$(node -p "require('./manifest.json').version")
          if [ "$tag" != "$manifest_version" ]; then
            echo "Tag ($tag) does not match manifest.json version ($manifest_version)" >&2
            exit 1
          fi

      # Stamp styles.css with the release version so every release asset is
      # byte-unique. Identical bytes across releases share a sha256 digest and
      # therefore inherit attestations from prior releases.
      - name: Stamp styles.css with version
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          printf '/* Property Kanban v%s */\n' "$tag" | cat - styles.css > styles.css.tmp
          mv styles.css.tmp styles.css

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --title="$tag" \
            --draft \
            main.js manifest.json styles.css
