name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18.x"

      - name: Build plugin
        run: |
          npm ci
          npm run build

      - name: Verify manifest version matches tag
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          manifest_version=$(node -p "require('./manifest.json').version")
          if [ "$tag" != "$manifest_version" ]; then
            echo "Tag ($tag) does not match manifest.json version ($manifest_version)" >&2
            exit 1
          fi

      # One attestation per asset: verifiers that expect a single subject
      # per attestation reject multi-subject bundles.
      - name: Attest build provenance (main.js)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: main.js

      - name: Attest build provenance (manifest.json)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: manifest.json

      - name: Attest build provenance (styles.css)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: styles.css

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --title="$tag" \
            --draft \
            main.js manifest.json styles.css
